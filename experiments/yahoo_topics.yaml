name: yahoo_topics
output_dir: results/yahoo_topics
# hf_token: null  # set here or via HF_TOKEN environment variable

# ── Slurm submission (used by scripts/submit_slurm.py) ───────────────────────
slurm:
  partition: gpu
  gpus_per_node: 1
  mem_gb: 80
  time: "24:00:00"
  cpus_per_task: 8
  conda_env: null        # e.g. "model-taxonomy" — set to activate a conda env
  modules: []            # e.g. ["cuda/12.1", "python/3.10"]
  account: null          # e.g. "myproject" — set if your cluster requires --account

# ── Datasets ──────────────────────────────────────────────────────────────────
# Yahoo Answers topics: topic 0 = Society & Culture, topic 1 = Science & Mathematics
# Five fine-tuning mixtures spanning the full range of proportions.
# A separate query dataset uses question_title for cleaner inference prompts.

datasets:
  # ── Fine-tuning datasets (fine-tune on best_answer text) ──────────────────
  - name: yahoo_topic0_only
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [0]

  - name: yahoo_topic1_only
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [1]

  - name: yahoo_75t0_25t1
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [0, 1]
        class_weights: {0: 3.0, 1: 1.0}

  - name: yahoo_50t0_50t1
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [0, 1]
        class_weights: {0: 1.0, 1: 1.0}

  - name: yahoo_25t0_75t1
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [0, 1]
        class_weights: {0: 1.0, 1: 3.0}

  # ── Query dataset (probe models with question titles) ─────────────────────
  - name: yahoo_queries
    recipe_type: class_aware
    n_samples: 128
    seed: 0
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: question_title
        class_field: topic
        class_filter: [0, 1]
        class_weights: {0: 1.0, 1: 1.0}

# ── Base models ───────────────────────────────────────────────────────────────
base_models:
  - meta-llama/Llama-3.1-8B

# ── LoRA fine-tuning ──────────────────────────────────────────────────────────
fine_tuning:
  enabled: true
  datasets:
    - yahoo_topic0_only
    - yahoo_topic1_only
    - yahoo_75t0_25t1
    - yahoo_50t0_50t1
    - yahoo_25t0_75t1
  n_samples: 1000
  seed: 42
  lora_rank: 16
  lora_alpha: 32
  target_modules: [q_proj, v_proj, k_proj, o_proj]
  lora_dropout: 0.05
  n_epochs: 3
  learning_rate: 2.0e-4
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 512
  torch_dtype: float16

# ── Representation extraction ─────────────────────────────────────────────────
extraction:
  models: [fine_tuned]
  queries_dataset: yahoo_queries
  n_queries: 128
  device: cuda
  batch_size: 4
  torch_dtype: float16
  taxonomies:
    functional:
      enabled: true
      layer_indices: [-1, -4, -8, -16]
      activation_mode: input
      pooling: mean
      normalize_activations: true
    behavioral:
      enabled: true
      max_new_tokens: 64
      embedder:
        type: sentence_transformer
        model_name: nomic-ai/nomic-embed-text-v1.5
        normalize_embeddings: true
        trust_remote_code: true
        prompt_name: search_document

# ── Taxonomy analysis ─────────────────────────────────────────────────────────
taxonomy:
  models: [fine_tuned]
  taxonomies: [functional, behavioral, structural]
  metrics:
    functional: cka
    behavioral: frobenius
    structural: frobenius
  geometry: [mds]
