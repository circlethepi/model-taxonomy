name: yahoo_topics_mean_cosine
output_dir: results/yahoo_topics_mean_cosine

slurm:
  partition: a100
  gpus_per_node: 1
  mem_gb: 80
  time: "04:00:00"
  cpus_per_task: 8
  conda_env: null
  modules: []
  account: null

# Yahoo Answers topics: topic 0 = Society & Culture, topic 1 = Science & Mathematics
# Five mixtures spanning the full proportion range; one query dataset.
datasets:
  - name: yahoo_topic0_only
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [0]

  - name: yahoo_topic1_only
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [1]

  - name: yahoo_75t0_25t1
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [0, 1]
        class_weights: {0: 3.0, 1: 1.0}

  - name: yahoo_50t0_50t1
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [0, 1]
        class_weights: {0: 1.0, 1: 1.0}

  - name: yahoo_25t0_75t1
    recipe_type: class_aware
    n_samples: 1000
    seed: 42
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: best_answer
        class_field: topic
        class_filter: [0, 1]
        class_weights: {0: 1.0, 1: 3.0}

  - name: yahoo_queries
    recipe_type: class_aware
    n_samples: 128
    seed: 0
    entries:
      - dataset_id: yahoo_answers_topics
        split: train
        weight: 1.0
        text_field: question_title
        class_field: topic
        class_filter: [0, 1]
        class_weights: {0: 1.0, 1: 1.0}

base_models:
  - meta-llama/Llama-3.2-3B

fine_tuning:
  enabled: false

extraction:
  models: [base_models]
  queries_dataset: yahoo_queries
  n_queries: 128
  device: cuda
  batch_size: 4
  torch_dtype: float16
  taxonomies:
    functional:
      enabled: false
    behavioral:
      enabled: false
    dataset_embedding:
      enabled: true
      n_samples: 1000
      seed: 42
      representation: mean        # (1, d) centroid vector per dataset; use cosine metric
      embedder:
        model_name: nomic-ai/nomic-embed-text-v1.5
        normalize_embeddings: true
        trust_remote_code: true
        prompt_name: document

taxonomy:
  models: [base_models]
  taxonomies: [dataset_embedding]
  metrics:
    dataset_embedding: cosine
  geometry: [mds]
